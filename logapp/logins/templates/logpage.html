<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>Logapp frontpage</title>
    </head>
    <body>
        <h1>Logapp</h1>
        Welcome <b>{{user.username}}</b>

        <form action='logout/' method="POST">
			{% csrf_token %}
            <input type="submit" value="Logout"/>
        </form>

        <h3>Logs for user:</h3>

        <ul>
            {% for log in logs %}
                <li>{{log}}</li>
            {% endfor %}
        </ul>

        <button class="button" onclick="openForm();">Add new log</button>
        <div>
            <form id="log" action='create_log/' method="GET">
                {% csrf_token %}
                <input type="datetime-local" placeholder="datetime" name="timeoflog" ><br>
                Log type:<br>
                <input type="checkbox" name="login">log in</input>
                <input type="checkbox" name="logout">log out</input><br>
                <button type="submit">Create</button>
            </form>
        </div>

        <script inline="javascript">
            var butt = false;
            const the_form = document.getElementById("log");
            the_form.style.display = 'none';
            function openForm() {
                if (the_form.style.display === 'none') {
                    console.log(true);
                    the_form.style.display = 'block';
                } else {
                    console.log(false);
                    the_form.style.display = 'none';
                }
            }
		</script>
    </body>
</html>
